  <rect x="608" y="476" width="128" height="18" rx="9" fill="#edf7e6" stroke="#3b6d11" stroke-width="0.8"/>
  <text x="672" y="488" text-anchor="middle" font-size="9" font-weight="500" fill="#27500a">SNS success notification</text>

